# Firebase App Hosting — https://firebase.google.com/docs/app-hosting
#
# Database: Cloud SQL for PostgreSQL (same instance for everything below).
# - App APIs use node-postgres (`pg`) → DATABASE_URL (games, leagues, rooms, etc.).
# - Firebase Data Connect adds GraphQL + managed tables on that same DB (see dataconnect/).
# Instance: ipl-fantasy-league-71959-instance (asia-south1)
#
# Secrets to set (then grant the App Hosting backend access — names must match `env.secret` below):
#   firebase apphosting:secrets:set DATABASE_URL --project ipl-fantasy-league-71959
#   firebase apphosting:secrets:grantaccess DATABASE_URL --backend fantasy-league --location asia-southeast1 --project ipl-fantasy-league-71959
#
# DATABASE_URL format for Cloud SQL via Cloud Run (Unix socket — requires instance attached to Cloud Run):
#   postgresql://USER:PASSWORD@/ipl-fantasy-league-71959-database?host=/cloudsql/ipl-fantasy-league-71959:asia-south1:ipl-fantasy-league-71959-instance
#
# If API routes return 500, attach this instance to the App Hosting Cloud Run service (socket path only works then):
#   gcloud run services list --project=ipl-fantasy-league-71959 --region=asia-southeast1
#   gcloud run services update SERVICE_NAME --region=asia-southeast1 --project=ipl-fantasy-league-71959 \
#     --add-cloudsql-instances=ipl-fantasy-league-71959:asia-south1:ipl-fantasy-league-71959-instance
# Re-deploy after; if a rollout overwrites this, add the connection in Cloud Run → service → Edit → Connections.
#
# Console (or apphosting.yaml below): set APP_URL to your live URL (BUILD + RUNTIME) for metadata.
# Enable Firestore + Data Connect APIs in Google Cloud. Deploy Data Connect: firebase deploy --only dataconnect

runConfig:
  memoryMiB: 1024
  cpu: 1
  concurrency: 20

# Do not set scripts.buildCommand / scripts.runCommand here unless you must.
# Overriding buildCommand opts you out of Firebase's Next.js adapter, which can break
# Cloud Run startup (PORT / health checks). Build is `npm run build` from package.json
# (`next build --webpack`).

env:
  # Avoid OOM during `next build` on constrained builders (exit 51 / non-zero build step).
  - variable: NODE_OPTIONS
    value: --max-old-space-size=4096
    availability: [BUILD]
  # Cloud SQL connector — replaces socket-based DATABASE_URL on Cloud Run.
  # CLOUD_SQL_INSTANCE triggers the connector path in src/lib/db.ts.
  - variable: CLOUD_SQL_INSTANCE
    value: ipl-fantasy-league-71959:asia-south1:ipl-fantasy-league-71959-instance
    availability: [RUNTIME]
  - variable: DB_NAME
    value: ipl-fantasy-league-71959-database
    availability: [RUNTIME]
  - variable: DB_USER
    value: postgres
    availability: [RUNTIME]
  - variable: DB_PASSWORD
    secret: DB_PASSWORD
    availability: [RUNTIME]
  # Server / Data Connect (same project as dataconnect/dataconnect.yaml)
  - variable: DATA_CONNECT_SERVICE_ID
    value: ipl-fantasy-league-71959-service
    availability: [RUNTIME]
  - variable: DATA_CONNECT_LOCATION
    value: asia-south1
    availability: [RUNTIME]
  # Client bundle — Firebase Web config (public; must be BUILD + RUNTIME for Next.js)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCWQ5AQjLMKm3bdtkV9SvFYBoQF_zrWp8Q
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ipl-fantasy-league-71959.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ipl-fantasy-league-71959
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ipl-fantasy-league-71959.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "6454448286"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:6454448286:web:886fa7b0685880cb112b8f
    availability: [BUILD, RUNTIME]
