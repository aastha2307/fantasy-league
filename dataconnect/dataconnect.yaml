# Firebase Data Connect — same Cloud SQL instance as the Next.js app (`pg`, see apphosting.yaml).
# Deploy: firebase deploy --only dataconnect --project ipl-fantasy-league-71959
#
# schemaValidation: COMPATIBLE — leaves existing app tables untouched; only adds DC-managed tables.
specVersion: "v1alpha"
serviceId: "ipl-fantasy-league-71959-service"
location: "asia-south1"
schema:
  source: "./schema"
  datasource:
    postgresql:
      database: "ipl-fantasy-league-71959-database"
      cloudSql:
        instanceId: "ipl-fantasy-league-71959-instance"
        schemaValidation: "COMPATIBLE"
connectorDirs:
  - "./ipl-fantasy-connector"
