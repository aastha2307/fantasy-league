query DcListHealth($limit: Int) @auth(level: PUBLIC) {
  dcHealths(limit: $limit) {
    id
    label
  }
}

query ListGameRooms($limit: Int) @auth(level: PUBLIC) {
  gameRooms(limit: $limit) {
    id
    cricApiMatchId
    label
  }
}

query ListGamePlayers($roomId: String!, $limit: Int) @auth(level: PUBLIC) {
  gamePlayers(where: { roomId: { eq: $roomId } }, limit: $limit) {
    id
    displayName
    ocrPoints
  }
}

query ListLeagues($limit: Int) @auth(level: PUBLIC) {
  leagues(limit: $limit) {
    id
    name
    joinCode
  }
}

query ListMatches($leagueId: String!, $limit: Int) @auth(level: PUBLIC) {
  matches(where: { leagueId: { eq: $leagueId } }, limit: $limit) {
    id
    label
    cricApiMatchId
  }
}
