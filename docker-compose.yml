# Local PostgreSQL — matches DATABASE_URL in .env.example
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iplfantasy
    ports:
      - "5432:5432"
    volumes:
      - iplfantasy_pgdata:/var/lib/postgresql/data
      # First boot only: creates tables (remove volume to re-init)
      - ./sql/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro

volumes:
  iplfantasy_pgdata:
